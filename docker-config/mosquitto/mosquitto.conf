# Mosquitto Broker Configuration for Dragao-app
persistence true
persistence_location /mosquitto/data/
log_dest stdout

# MQTT Listener (Internal & Fanapp via port mapping 1884)
listener 1883 0.0.0.0
allow_anonymous true

# WebSockets Listener (Fanapp via port mapping 9002)
listener 9001 0.0.0.0
protocol websockets
allow_anonymous true
