persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log

# Global security settings
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl

# ── Insecure listeners (internal-only, for service-to-service within Docker) ──
# These are NOT exposed outside the Docker network.
listener 1883

# Insecure WebSockets (internal — Flutter dev via HTTP, not exposed externally)
listener 9001
protocol websockets

# ── Secure MQTTS listener (8883) — for Python microservices ──────────────────
listener 8883
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/mosquitto.crt
keyfile /mosquitto/certs/mosquitto.key
tls_version tlsv1.2
require_certificate false

# ── Secure MQTTS over WebSockets (9003) — for Flutter app ────────────────────
listener 9003
protocol websockets
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/mosquitto.crt
keyfile /mosquitto/certs/mosquitto.key
tls_version tlsv1.2
require_certificate false
